                    <h4 class="font-bold text-blue-700">การจับกุม (ม.78)</h4>
                    <p>พนักงานฝ่ายปกครองหรือตำรวจจะจับผู้ใดโดยไม่มีหมายจับไม่ได้ <strong>เว้นแต่:</strong></p>
                    <ul class="list-disc pl-5">
                        <li>1. เป็นความผิดซึ่งหน้า</li>
                        <li>2. พบผู้ต้องสงสัยมีพฤติการณ์อันควรสงสัย (พกเครื่องมือจะไปก่อเหตุ/ของโจร)</li>
                        <li>3. มีเหตุออกหมายจับได้ แต่มีความจำเป็นเร่งด่วนนำหมายไม่ทัน (จะหลบหนี)</li>
                    </ul>

                    <h4 class="font-bold text-blue-700 mt-4">การตรวจค้น (ม.92) ห้ามค้นในที่รโหฐานโดยไม่มีหมายค้น เว้นแต่:</h4>
                    <ul class="list-disc pl-5">
                        <li>มีเสียงร้องให้ช่วยจากข้างใน</li>
                        <li>มีผู้กระทำผิดซึ่งหน้าหนีเข้าไปซ่อนตัว</li>
                        <li>มีพยานหลักฐานสิ่งของผิดกฎหมายซ่อนอยู่ และหากรอหมายค้น สิ่งของนั้นจะถูกทำลาย/โยกย้าย (ต้องมีผู้บังคับบัญชาชั้นผู้ใหญ่/สว.ขึ้นไปเป็นผู้นำค้น)</li>
                    </ul>
                </div>`
        },
        {
            id: 'v16',
            title: "เทคโนโลยีในการสืบสวน",
            category: "เทคโนโลยี",
            icon: "📱",
            description: "Digital Forensics, การไล่กล้อง CCTV และ CDR",
            content: `
                <h3 class="text-2xl font-bold text-indigo-800 mb-4 border-b-2 border-indigo-100 pb-2">เทคโนโลยีช่วยงานสืบสวน</h3>
                <div class="space-y-4 text-gray-700">
                    <h4 class="font-bold text-blue-700">1. การวิเคราะห์ข้อมูลการใช้โทรศัพท์ (CDR)</h4>
                    <p>Call Detail Record ประวัติการโทร, ตำแหน่งเสาสัญญาณ (Cell Site) เพื่อยืนยันว่าผู้ต้องสงสัยอยู่ที่ไหนในช่วงเวลาเกิดเหตุ (Alibi) และติดต่อกับใคร (หาเครือข่าย)</p>

                    <h4 class="font-bold text-blue-700 mt-4">2. การสืบสวนวงจรปิด (CCTV Tracking)</h4>
                    <ul class="list-disc pl-5">
                        <li>ไล่ตามเวลาจริง (Real-time) และย้อนหลัง</li>
                        <li><strong>จุดที่ต้องโฟกัส:</strong> เส้นทางมาก่อเหตุ (Approach), จุดเกิดเหตุ (Scene), และเส้นทางหลบหนี (Escape Route) ทิ้งรถ/เปลี่ยนเสื้อผ้า</li>
                    </ul>

                    <h4 class="font-bold text-blue-700 mt-4">3. OSINT (Open-Source Intelligence)</h4>
                    <p>การสืบข้อมูลจากสื่อสาธารณะ: เช็คหน้าโปรไฟล์ Facebook, TikTok, IG ของเป้าหมาย ดูรายชื่อเพื่อน รูปถ่ายสถานที่เช็คอิน เพื่อนำมาวิเคราะห์ความสัมพันธ์เบื้องต้น</p>
                </div>`
        },
        {
            id: 'v17',
            title: "จิตวิทยาอาชญากรรม",
            category: "จิตวิทยา",
            icon: "🧠",
            description: "Modus Operandi (MO) แผนประทุษกรรม และการทำโปรไฟล์",
            content: `
                <h3 class="text-2xl font-bold text-indigo-800 mb-4 border-b-2 border-indigo-100 pb-2">จิตวิทยาและการทำโปรไฟล์อาชญากร</h3>
                <div class="space-y-4 text-gray-700">
                    <h4 class="font-bold text-blue-700">Modus Operandi (M.O. - แผนประทุษกรรม)</h4>
                    <p>วิธีการที่คนร้ายใช้ในการก่อเหตุให้สำเร็จ (M.O. สามารถเปลี่ยนและพัฒนาได้ตามประสบการณ์) เช่น การงัดประตูหน้าต่างแบบเดิม, การใช้เครื่องมือเฉพาะ, หรือการใช้คำพูดเดิมๆ กับเหยื่อ</p>

                    <h4 class="font-bold text-blue-700 mt-4">ลายเซ็นอาชญากร (Signature)</h4>
                    <p>สิ่งที่ไม่จำเป็นต้องทำเพื่อบรรลุผล แต่คนร้ายทำเพื่อสนองความต้องการทางจิตใจ (ไม่ค่อยเปลี่ยน) เช่น การจัดท่าศพ, การขโมยของที่ระลึกจากเหยื่อ, การผูกเงื่อนเชือกเฉพาะตัว</p>

                    <h4 class="font-bold text-blue-700 mt-4">ประเภทอาชญากรเบื้องต้น</h4>
                    <ul class="list-disc pl-5">
                        <li><strong>แบบมีการวางแผน (Organized):</strong> ฉลาด เตรียมตัวมาดี เลือกเหยื่อล่วงหน้า ซ่อนหลักฐาน เก็บกวาดที่เกิดเหตุ (สืบยาก)</li>
                        <li><strong>แบบไม่มีการวางแผน (Disorganized):</strong> มักก่อเหตุจากอารมณ์ชั่ววูบ ใช้ของใกล้มือเป็นอาวุธ ทิ้งหลักฐานเกลื่อนกลาด</li>
                    </ul>
                </div>`
        }
    ];

    function renderCards(data) {
        const grid = document.getElementById('knowledgeGrid');
        const count = document.getElementById('resultCount');
        
        count.textContent = data.length;
        
        if(data.length === 0) {
            grid.innerHTML = `<div class="col-span-full text-center py-10 text-gray-400">ไม่พบข้อมูลที่ค้นหา</div>`;
            return;
        }

        grid.innerHTML = data.map(item => `
            <div onclick="openModal('${item.id}')" class="knowledge-card bg-white p-6 rounded-2xl shadow-sm cursor-pointer relative overflow-hidden group">
                <div class="absolute top-0 right-0 p-4 opacity-10 group-hover:opacity-20 transition-opacity">
                    <span class="text-6xl">${item.icon}</span>
                </div>
                <div class="text-3xl mb-4 relative z-10">${item.icon}</div>
                <div class="text-xs font-bold text-blue-600 bg-blue-50 inline-block px-2 py-1 rounded mb-2 relative z-10">${item.category}</div>
                <h3 class="text-xl font-bold text-gray-800 mb-2 relative z-10 line-clamp-2">${item.title}</h3>
                <p class="text-gray-500 text-sm relative z-10 line-clamp-3">${item.description}</p>
            </div>
        `).join('');
    }

    function openModal(id) {
        const item = knowledgeData.find(i => i.id === id);
        if (item) {
            document.getElementById('modalBody').innerHTML = item.content;
            const modal = document.getElementById('knowledgeModal');
            modal.classList.add('active');
            
            // Animation for modal content
            const content = modal.querySelector('.modal-content');
            content.style.transform = 'scale(0.95)';
            content.style.opacity = '0';
            setTimeout(() => {
                content.style.transition = 'all 0.2s ease-out';
                content.style.transform = 'scale(1)';
                content.style.opacity = '1';
            }, 10);
            
            document.body.style.overflow = 'hidden';
        }
    }

    function closeModal() {
        const modal = document.getElementById('knowledgeModal');
        const content = modal.querySelector('.modal-content');
        
        content.style.transform = 'scale(0.95)';
        content.style.opacity = '0';
        
        setTimeout(() => {
            modal.classList.remove('active');
            document.body.style.overflow = 'auto';
            content.style.transition = ''; // reset
        }, 200);
    }

    // Search logic
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase().trim();
        const filtered = knowledgeData.filter(i => 
            i.title.toLowerCase().includes(term) || 
            i.category.toLowerCase().includes(term) ||
            i.description.toLowerCase().includes(term) ||
            i.content.toLowerCase().includes(term)
        );
        renderCards(filtered);
    });

    // Close Modals events
    document.getElementById('closeModal').onclick = closeModal;
    window.onclick = (e) => {
        if (e.target.id === 'knowledgeModal') closeModal();
    };
    
    // Close on Escape key
    document.addEventListener('keydown', (e) => {
        if(e.key === 'Escape' && document.getElementById('knowledgeModal').classList.contains('active')) {
            closeModal();
        }
    });

    // Initial render
    renderCards(knowledgeData);
</script>
</body>
</html>
